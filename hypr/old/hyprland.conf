### MONITORS
monitor=DP-3,1920x1080@180,0x0,1
monitor=HDMI-A-1,1920x1080@144,-1920x0,1

### MY PROGRAMS
$terminal = foot
$fileManager = pcmanfm-qt
$menu = wofi --show drun

### AUTOSTART
exec-once = lxqt-policykit-agent
exec-once = pkill swaybg; swaybg -i ~/Pictures/Wallpapers/Anime/wallhaven-pk61xe.png -m fill
exec-once = ~/.config/waybar/launch.sh
exec-once = mako
# exec-once = hyprctl setcursor Catppuccin Mocha Lavender 24
# exec-once = swayidle -w timeout 300 "systemctl suspend" # Strømmen er dyr :(
# exec-once = music-discord-rpc

windowrule = match:class lxqt-policykit-agents, center on
windowrule = match:class lxqt-policykit-agent, float on

### ENVIRONMENT VARIABLES
# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct

# QT
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

### LOOK AND FEEL
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 3
    col.active_border = rgba(29,32,33,1)
    col.inactive_border = rgba(60,56,54,1)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = smoothOut, 0.25, 1, 0.5, 1
    bezier = smoothIn,  0.5,  0, 0.75, 0
    bezier = smoothInOut, 0.65, 0, 0.35, 1

    animation = windows,       1, 4, smoothOut
    animation = windowsIn,     1, 3.5, smoothOut, popin 70%
    animation = windowsOut,    1, 2.5, smoothIn,  popin 100%

    animation = fade,          1, 2.5, smoothInOut
    animation = fadeIn,        1, 2, smoothOut
    animation = fadeOut,       1, 2, smoothIn

    animation = workspaces,    1, 3, smoothInOut, slide
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

### INPUT
input {
    kb_layout = no
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0
    force_no_accel = true

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

### KEYBINDINGS
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, R, exec, ~/.config/waybar/launch.sh
bind = , PRINT, exec, hyprshot -m region -o ~/Pictures/Screenshots

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
bind = $mainMod SHIFT, INSERT, exec, ~/.config/hypr/scripts/set-brightness.sh 100
bind = $mainMod SHIFT, HOME, exec, ~/.config/hypr/scripts/set-brightness.sh 50
bind = $mainMod SHIFT, PAGE_UP, exec, ~/.config/hypr/scripts/set-brightness.sh 0
bind = $mainMod SHIFT, END, exec, ddcutil -b 5 setvcp 10 100 && ddcutil -b 2 setvcp 10 0

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

### WINDOWS AND WORKSPACES
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
